<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MEP Survey</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
.header{background:#1f3a5f;color:white;padding:14px;font-size:20px;}
.container{padding:14px;}
.card{
background:white;
padding:14px;
margin-bottom:12px;
border-radius:8px;
display:flex;
flex-direction:column;
}

input[type="text"], textarea{
width:100%;
padding:18px;
font-size:22px;
margin-top:10px;
box-sizing:border-box;
border-radius:10px;
line-height:1.4;
height:60px;
}

button{padding:12px;width:100%;margin-top:10px;font-size:16px;}
.checkrow{
display:flex;
align-items:center;
gap:10px;
margin-top:8px;
}

.eqItem{border-bottom:1px solid #ddd;padding:8px 0;}
.badge{font-size:14px;color:#666;}
</style>
</head>

<body>
<div id="app"></div>
<script src="app.js"></script>
</body>
</html>
